<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#f5f1e8" />

    <title>Nereus — fact vs. opinion, across the web</title>
    <meta name="description"
      content="Search a topic across news, Reddit, and YouTube. Nereus classifies each result as fact or opinion with an evaluated AI model." />

    <!-- Open Graph / Twitter (set og:url to your deployed URL) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nereus" />
    <meta property="og:title" content="Nereus — fact vs. opinion, across the web" />
    <meta property="og:description"
      content="Search a topic across news, Reddit, and YouTube. Every result is classified fact vs. opinion by an evaluated AI model." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Nereus — fact vs. opinion, across the web" />
    <meta name="twitter:description"
      content="Search a topic across news, Reddit, and YouTube — what's reported, and what's argued." />

    <!-- Warm the API connection while the JS bundle is still loading, so the first
         /feed fetch skips DNS + TLS setup (~0.3-0.5s). Prod backend origin; harmless
         in dev where the request goes through the Vite proxy instead. -->
    <link rel="preconnect" href="https://sambhojwani-nereus-api.hf.space" crossorigin />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts without blocking first paint: preload the CSS, then promote it to a
         stylesheet on load. With display=swap, text paints immediately in the fallback
         and swaps to the webfont when ready. Only the weights actually used are requested. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
