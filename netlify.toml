# Netlify config for the frontend (a Vite SPA living in frontend/).
# Set VITE_API_BASE (your deployed backend URL) in Netlify's UI:
#   Site settings → Environment variables → VITE_API_BASE = https://<user>-<space>.hf.space
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"          # relative to base → frontend/dist

# Single-page app: serve index.html for any path (harmless even with no client routing).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
